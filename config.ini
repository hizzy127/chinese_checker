# Chinese Checkers AI Configuration
#
# Usage: ./build/chinese_checkers config.ini
#
# Each [player.N] section configures player N (1-6).
# Opposing pairs: 1&6, 2&5, 3&4.
# Parameters not specified will use defaults.
#
# Available AI types: MinimaxAI, GreedyAI

[game]
max_turns = 500

[player.1]
type = MinimaxAI
search_depth = 2
deviation_penalty = 0.5
future_discount = 0.9
# bfs_discount = 0.8
# opponent_discount = 0.3
# max_branch = 20
# win_score = 1000.0
# base_score_cutoff = -2.0
# home_region_bonus = 0.5
# wrong_region_penalty = 10.0

[player.6]
type = MinimaxAI
search_depth = 2
deviation_penalty = 0.6
future_discount = 0.7
